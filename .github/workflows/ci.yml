name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - 'codex/**'

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck (1)
        run: npm run typecheck

      - name: Typecheck (2)
        run: npm run typecheck

      - name: Proxy policy tests
        run: npm run test:proxy

      - name: Build
        run: npm run build
